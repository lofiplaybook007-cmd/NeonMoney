<main class="dashboard-main">
  <div class="dashboard-header flex-between">
    <div>
      <h2>Price <span class="gradient-text">Alerts</span></h2>
      <p>Notifications for price drops on your tracked items.</p>
    </div>
    <button class="btn btn-secondary btn-sm">Clear All</button>
  </div>

  <div class="glass-card" style="padding:28px;">
    <div style="display:flex; flex-direction:column; gap:12px;">
      
      <div class="alert-box alert-warning alert-pulse">
        <span style="font-size:1.5rem;">🔥</span>
        <div style="flex: 1;">
          <div style="font-weight:600; font-size:1rem; color:var(--text-primary);">Massive Price Drop!</div>
          <div style="font-size:0.9rem; color:var(--text-secondary);">The Nike Air Max shoes on your wishlist just dropped by ₹996 on Flipkart!</div>
        </div>
        <a href="deals.html" class="btn btn-primary btn-sm">View Deal</a>
      </div>

    </div>
  </div>
</main>
