<main class="dashboard-main">
  <div class="dashboard-header">
    <h2>My <span class="gradient-text">Wishlist</span></h2>
    <p>Items you've saved to buy later when the price drops.</p>
  </div>

  <div class="grid-3">
    <div class="product-card">
      <div class="card-img" style="font-size: 4rem;">🎧</div>
      <div class="card-body">
        <h3 class="card-title">Sony WH-1000XM5 Headphones</h3>
        <div class="card-prices">
          <span class="price-new">₹24,990</span>
        </div>
        <button class="btn btn-primary btn-sm" style="width: 100%;">Buy Now</button>
        <button class="btn btn-secondary btn-sm" style="width: 100%; margin-top: 8px; border-color: var(--neon-red); color: var(--neon-red);">Remove</button>
      </div>
    </div>

    <div class="product-card">
      <div class="card-img" style="font-size: 4rem;">📱</div>
      <div class="card-body">
        <h3 class="card-title">iQOO Neo 10R 5G</h3>
        <div class="card-prices">
          <span class="price-new">₹34,999</span>
        </div>
        <button class="btn btn-primary btn-sm" style="width: 100%;">Buy Now</button>
        <button class="btn btn-secondary btn-sm" style="width: 100%; margin-top: 8px; border-color: var(--neon-red); color: var(--neon-red);">Remove</button>
      </div>
    </div>
  </div>
</main>
