<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist — NeonMoney 💸</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="icon" type="image/png" href="logo.png">
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="logo.png" alt="NeonMoney Logo" style="height: 36px; width: auto; margin-right: 8px; border-radius: 8px;">
        Neon<span class="accent">Money</span>
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="deals.html">Deals</a>
        <a href="store.html">Stores</a>
        <a href="rewards.html">Rewards</a>
        <a href="faq.html">FAQ</a>
      </div>
      <div class="nav-actions">
        <div class="nav-coins" id="nav-coins">💰 <span id="nav-coins-val">0</span></div>
        <div id="nav-user-menu" style="display:flex; gap:8px; align-items:center;">
          <button class="btn btn-secondary btn-sm btn-logout" id="logout-btn">Logout</button>
        </div>
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div> 
      </div>
    </div>
  </nav>

  <div class="dashboard-layout" style="padding-top: 100px;">
    
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-link"><span class="sidebar-icon">🏠</span> Dashboard</a>
      <a href="rewards.html" class="sidebar-link"><span class="sidebar-icon">💰</span> My Coins</a>
      <a href="rewards.html" class="sidebar-link"><span class="sidebar-icon">🎁</span> Rewards</a>
      <a href="deals.html" class="sidebar-link"><span class="sidebar-icon">🔥</span> Deals</a>

      <div class="sidebar-section-label">Activity</div>
      <a href="alerts.html" class="sidebar-link"><span class="sidebar-icon">🔔</span> Alerts <span class="sidebar-badge">3</span></a>
      <a href="history.html" class="sidebar-link"><span class="sidebar-icon">📋</span> History</a>
      <a href="wishlist.html" class="sidebar-link active"><span class="sidebar-icon">⭐</span> Wishlist</a>

      <div class="sidebar-section-label">Account</div>
      <a href="profile.html" class="sidebar-link"><span class="sidebar-icon">👤</span> Profile</a>
      <a href="faq.html" class="sidebar-link"><span class="sidebar-icon">❓</span> Help</a>
      <button class="sidebar-link btn-logout" id="sidebar-logout-btn" style="background:none;border:none;cursor:pointer;color:var(--text-muted);text-align:left;width:100%;"><span class="sidebar-icon">🚪</span> Logout</button>
    </aside>

    <main class="dashboard-main">
      <div class="dashboard-header">
        <h2>My <span class="gradient-text">Wishlist</span></h2>
        <p>Items you've saved to buy later when the price drops.</p>
      </div>

      <div class="grid-3">
        <div class="product-card">
          <div class="card-img" style="font-size: 4rem;">🎧</div>
          <div class="card-body">
            <h3 class="card-title">Sony WH-1000XM5 Headphones</h3>
            <div class="card-prices">
              <span class="price-new">₹24,990</span>
            </div>
            <button class="btn btn-primary btn-sm" style="width: 100%;">Buy Now</button>
            <button class="btn btn-secondary btn-sm" style="width: 100%; margin-top: 8px; border-color: var(--neon-red); color: var(--neon-red);">Remove</button>
          </div>
        </div>

        <div class="product-card">
          <div class="card-img" style="font-size: 4rem;">📱</div>
          <div class="card-body">
            <h3 class="card-title">iQOO Neo 10R 5G</h3>
            <div class="card-prices">
              <span class="price-new">₹34,999</span>
            </div>
            <button class="btn btn-primary btn-sm" style="width: 100%;">Buy Now</button>
            <button class="btn btn-secondary btn-sm" style="width: 100%; margin-top: 8px; border-color: var(--neon-red); color: var(--neon-red);">Remove</button>
          </div>
        </div>
        
        </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBNXh2aPjvZcWceDxCuMNzJegJ3RKwNsx0",
      authDomain: "neonmoney-a2d18.firebaseapp.com",
      projectId: "neonmoney-a2d18",
      storageBucket: "neonmoney-a2d18.firebasestorage.app",
      messagingSenderId: "759618988071",
      appId: "1:759618988071:web:b65d190a3a7ececabc4602"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // Fetch LIVE Coin Balance for the Navbar
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        const navCoinDisplay = document.getElementById('nav-coins-val');

        let currentCoins = 0;
        if (userSnap.exists()) {
          currentCoins = userSnap.data().coins;
        } else {
          currentCoins = parseInt(localStorage.getItem('neon_coins')) || 0;
        }
        
        if (navCoinDisplay) navCoinDisplay.textContent = currentCoins.toLocaleString('en-IN');
      } else {
        window.location.href = 'login.html'; // Protect the page
      }
    });

    // Logout logic
    const logoutBtns = document.querySelectorAll('.btn-logout');
    logoutBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        signOut(auth).then(() => {
          window.location.href = 'login.html';
        });
      });
    });
  </script>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.querySelector('.nav-links');
    if(hamburger && navLinks) {
      hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('active');
      });
    }
  </script>
</body>
</html>
